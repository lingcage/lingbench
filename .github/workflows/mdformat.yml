name: LingBench Mdformat

on:
  pull_request:

jobs:
  mdformat:
    name: Check Markdown Formatting
    uses: ./.github/workflows/per-commit.yml
    with:
      run: |
        if ! command -v mdformat >/dev/null 2>&1; then
          pipx install mdformat || python3 -m pip install --user mdformat
        fi
        mdformat --check .
